services:
  postgres:
    image: postgres:16-alpine
    container_name: ops-erp-postgres
    environment:
      POSTGRES_DB: ops_erp
      POSTGRES_USER: ops_erp
      POSTGRES_PASSWORD: ops_erp
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_erp -d ops_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ops-erp-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ops-erp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ops_erp_minio
      MINIO_ROOT_PASSWORD: ops_erp_minio_password
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
