spring:
  datasource:
    url: jdbc:h2:file:${OPS_ERP_LOCAL_DATA:${user.home}/.ops-erp-data/ops_erp};DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      continue-on-error: true
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  health:
    redis:
      enabled: false

ops:
  storage:
    local-path: ${OPS_ERP_UPLOAD_PATH:${user.home}/.ops-erp-data/uploads}
  qualification:
    import: false
