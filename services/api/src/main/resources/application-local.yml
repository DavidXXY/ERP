spring:
  datasource:
    url: jdbc:h2:file:${OPS_ERP_LOCAL_DATA:${user.home}/.ops-erp-data/ops_erp};DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=YEAR
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    validate-on-migrate: true
    clean-disabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  health:
    redis:
      enabled: false

ops:
  storage:
    type: local
    local-path: ${OPS_ERP_UPLOAD_PATH:${user.home}/.ops-erp-data/uploads}
  qualification:
    import: false
