spring:
  autoconfigure:
    exclude:
  datasource:
    url: jdbc:h2:file:${OPS_ERP_LOCAL_DATA:${user.home}/.ops-erp-data/ops_erp};DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    locations: classpath:db/migration-h2
    clean-disabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

  database-schema-update: true
  async-executor-activate: false
  database-type: h2

management:
  health:
    redis:
      enabled: false

ops:
  storage:
    local-path: ${OPS_ERP_UPLOAD_PATH:${user.home}/.ops-erp-data/uploads}
