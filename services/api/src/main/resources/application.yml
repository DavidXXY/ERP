server:
  port: 8080

spring:
  application:
    name: ops-erp-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ops_erp}
    username: ${DB_USERNAME:ops_erp}
    password: ${DB_PASSWORD:ops_erp}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 80MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [requestId=%X{requestId:-}]"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

ops:
  version: 0.1.0
  build-time: 2026-07-10
  security:
    jwt-secret: ${JWT_SECRET:ops-erp-local-development-secret-please-change}
    jwt-expire-minutes: ${JWT_EXPIRE_MINUTES:720}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5174,http://127.0.0.1:5174}
    login-max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    login-lock-minutes: ${LOGIN_LOCK_MINUTES:15}
    data-encryption-key: ${DATA_ENCRYPTION_KEY:ops-erp-local-data-encryption-key-change-me}
  storage:
    type: ${STORAGE_TYPE:local}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:ops_erp_minio}
    secret-key: ${MINIO_SECRET_KEY:ops_erp_minio_password}
    bucket: ${MINIO_BUCKET:ops-erp}
    presigned-expiry-seconds: ${MINIO_PRESIGNED_EXPIRY_SECONDS:600}
    local-path: ${LOCAL_STORAGE_PATH:.local-data/uploads}
  qualification:
    import: ${QUALIFICATION_IMPORT_ENABLED:false}
